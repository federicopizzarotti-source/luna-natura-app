name: Build APK LunaNatura

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Imposta Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Scarica jar e compila
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Salva APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: LunaNatura-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

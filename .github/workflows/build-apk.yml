name: Build APK LunaNatura
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4
 
      - name: Imposta Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Scarica gradle-wrapper.jar ufficiale
        run: curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
 
      - name: Permessi gradlew
        run: chmod +x gradlew

      - name: Decodifica keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > app/luna-natura-release.jks
 
      - name: Compila APK release firmato
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: luna-natura-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
 
      - name: Salva APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: LunaNatura-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
